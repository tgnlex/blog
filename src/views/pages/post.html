{% extends "layout/base.html" %}

{% if title %}
{% block title %}{{ post.title }}{% endblock%}
{% endif %}

{% block main %}
  <main class="article">
    <h1 id="article--title" class="text-shadow-blue">{{ post.title }}</h1>
    <article id="article--content">
      {{ post.body }}
    </article>

  </main>
{% endblock %}
